<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jeat Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #7c3aed;
      --red-dark: #5b21b6;
      --red-light: #f3eeff;
      --gray-bg: #faf8ff;
      --card-bg: #ffffff;
      --text: #1e1b2e;
      --muted: #888;
      --border: #e5e0f5;
      --star: #7c3aed;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--gray-bg);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .topbar-text {
      flex: 1;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      max-width: 340px;
    }

    .topbar-text p {
      font-size: 9px;
      color: #aaa;
      margin-top: 2px;
    }

    .address-input {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
      width: 200px;
      outline: none;
      background: white;
    }

    .address-input:focus { border-color: var(--red); }

    .tab-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-group span {
      font-size: 11px;
      color: var(--muted);
    }

    .btn-tab {
      border: none;
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-tab.active {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
    }

    .btn-tab.inactive {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-tab:hover { opacity: 0.88; }

    /* ── SECTION HEADER ── */
    .section-header {
      text-align: center;
      padding: 40px 24px 24px;
    }

    .section-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .section-header p {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── DECORATIVE CORNER ── */
    .corner-deco {
      position: fixed;
      top: 0;
      right: 0;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 0 0 0 80px;
      z-index: 0;
      opacity: 0.9;
    }

    /* ── MENU GRID ── */
    .menu-section {
      padding: 0 20px 40px;
      max-width: 560px;
      margin: 0 auto;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(232,80,58,0.12);
    }

    .card-img-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .card-img {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      object-fit: cover;
      background: #f0ede8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Food image circle */
    .food-circle {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, #f3eeff 0%, #e9d8fd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .food-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .img-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      opacity: 0.5;
    }

    .card-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .card-stars {
      display: flex;
      gap: 1px;
      margin-bottom: 4px;
    }

    .star { color: var(--star); font-size: 9px; }
    .star.empty { color: #ddd; }

    .card-desc {
      font-size: 8.5px;
      color: var(--muted);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .card-actions {
      display: flex;
      gap: 5px;
      width: 100%;
    }

    .btn-cart {
      flex: 1;
      padding: 5px 4px;
      border-radius: 20px;
      font-size: 7.5px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      border: 1.5px solid var(--red);
      background: white;
      color: var(--red);
    }

    .btn-order {
      flex: 1;
      padding: 5px 4px;
      border-radius: 20px;
      font-size: 7.5px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
    }

    .btn-cart:hover { background: var(--red-light); }
    .btn-order:hover { background: var(--red-dark); }

    /* ── STAGGERED ANIMATION ── */
    .card {
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1)  { animation-delay: 0.05s; }
    .card:nth-child(2)  { animation-delay: 0.10s; }
    .card:nth-child(3)  { animation-delay: 0.15s; }
    .card:nth-child(4)  { animation-delay: 0.20s; }
    .card:nth-child(5)  { animation-delay: 0.25s; }
    .card:nth-child(6)  { animation-delay: 0.30s; }
    .card:nth-child(7)  { animation-delay: 0.35s; }
    .card:nth-child(8)  { animation-delay: 0.40s; }
    .card:nth-child(9)  { animation-delay: 0.45s; }
    .card:nth-child(10) { animation-delay: 0.50s; }
    .card:nth-child(11) { animation-delay: 0.55s; }
    .card:nth-child(12) { animation-delay: 0.60s; }
    .card:nth-child(13) { animation-delay: 0.65s; }
    .card:nth-child(14) { animation-delay: 0.70s; }
    .card:nth-child(15) { animation-delay: 0.75s; }
  </style>
</head>
